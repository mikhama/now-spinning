<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, height=480, initial-scale=1.0, user-scalable=no">
    <title>Now Spinning</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header id="top-bar">
        <div id="mode-label">Mode: Standby</div>
        <div id="stylus-info">
            <div id="stylus-bar-compact" class="stylus-bar stylus-bar--compact">
                <div id="stylus-bar-compact-fill" class="stylus-bar__fill"></div>
            </div>
            <span id="temperature-display"></span>
        </div>
    </header>

    <main id="content">
        <!-- Standby mode -->
        <section id="mode-standby" class="mode-section">
            <div class="split-grid" id="standby-grid">
                <div class="cover-col">
                    <img id="standby-cover" class="cover-image" alt="Cover">
                </div>
                <div class="info-col">
                    <div id="standby-id" class="record-id"></div>
                    <div class="record-artist marquee-field">
                        <span id="standby-artist" class="marquee-track">
                            <span class="marquee-copy marquee-copy--primary"></span>
                            <span class="marquee-gap" aria-hidden="true"></span>
                            <span class="marquee-copy marquee-copy--duplicate" aria-hidden="true"></span>
                        </span>
                    </div>
                    <div class="record-title marquee-field">
                        <span id="standby-title" class="marquee-track">
                            <span class="marquee-copy marquee-copy--primary"></span>
                            <span class="marquee-gap" aria-hidden="true"></span>
                            <span class="marquee-copy marquee-copy--duplicate" aria-hidden="true"></span>
                        </span>
                    </div>
                </div>
            </div>
            <div class="split-grid" id="standby-error-grid" style="display:none">
                <div class="cover-col">
                    <div class="cover-placeholder">
                        <span class="cover-placeholder-text">NFC Reading Error</span>
                    </div>
                </div>
                <div class="info-col"></div>
            </div>
            <div class="split-grid" id="standby-not-found-grid" style="display:none">
                <div class="cover-col">
                    <div class="cover-placeholder">
                        <span class="cover-placeholder-text">Record Not Found</span>
                    </div>
                </div>
                <div class="info-col"></div>
            </div>
        </section>

        <!-- Play mode -->
        <section id="mode-play" class="mode-section">
            <div class="split-grid" id="play-grid">
                <div class="cover-col">
                    <img id="play-cover" class="cover-image" alt="Cover">
                </div>
                <div class="info-col">
                    <div id="play-id" class="record-id"></div>
                    <div class="record-artist marquee-field">
                        <span id="play-artist" class="marquee-track">
                            <span class="marquee-copy marquee-copy--primary"></span>
                            <span class="marquee-gap" aria-hidden="true"></span>
                            <span class="marquee-copy marquee-copy--duplicate" aria-hidden="true"></span>
                        </span>
                    </div>
                    <div class="record-title marquee-field">
                        <span id="play-title" class="marquee-track">
                            <span class="marquee-copy marquee-copy--primary"></span>
                            <span class="marquee-gap" aria-hidden="true"></span>
                            <span class="marquee-copy marquee-copy--duplicate" aria-hidden="true"></span>
                        </span>
                    </div>
                    <div class="now-playing marquee-field">
                        <span id="play-track" class="marquee-track">
                            <span class="marquee-copy marquee-copy--primary"></span>
                            <span class="marquee-gap" aria-hidden="true"></span>
                            <span class="marquee-copy marquee-copy--duplicate" aria-hidden="true"></span>
                        </span>
                    </div>
                </div>
            </div>
            <div class="split-grid" id="play-not-found-grid" style="display:none">
                <div class="cover-col">
                    <div class="cover-placeholder">
                        <span class="cover-placeholder-text">Record Not Found</span>
                    </div>
                </div>
                <div class="info-col"></div>
            </div>
        </section>

        <!-- Link mode -->
        <section id="mode-link" class="mode-section">
            <div class="split-grid" id="link-grid">
                <div class="cover-col">
                    <img id="link-cover" class="cover-image" alt="Cover">
                </div>
                <div class="info-col">
                    <div id="link-id" class="record-id"></div>
                    <div class="record-artist marquee-field">
                        <span id="link-artist" class="marquee-track">
                            <span class="marquee-copy marquee-copy--primary"></span>
                            <span class="marquee-gap" aria-hidden="true"></span>
                            <span class="marquee-copy marquee-copy--duplicate" aria-hidden="true"></span>
                        </span>
                    </div>
                    <div class="record-title marquee-field">
                        <span id="link-title" class="marquee-track">
                            <span class="marquee-copy marquee-copy--primary"></span>
                            <span class="marquee-gap" aria-hidden="true"></span>
                            <span class="marquee-copy marquee-copy--duplicate" aria-hidden="true"></span>
                        </span>
                    </div>
                    <div id="link-status" class="link-status"></div>
                    <div id="link-error" class="error-state">Link Error</div>
                </div>
            </div>
            <div class="split-grid" id="link-empty-grid" style="display:none">
                <div class="cover-col">
                    <div class="cover-placeholder">
                        <span class="cover-placeholder-text">No Unlinked Records</span>
                    </div>
                </div>
                <div class="info-col"></div>
            </div>
        </section>

        <!-- Re-Link mode -->
        <section id="mode-re-link" class="mode-section">
            <div class="split-grid">
                <div class="cover-col">
                    <img id="re-link-cover" class="cover-image" alt="Cover">
                </div>
                <div class="info-col">
                    <div id="re-link-id" class="record-id"></div>
                    <div class="record-artist marquee-field">
                        <span id="re-link-artist" class="marquee-track">
                            <span class="marquee-copy marquee-copy--primary"></span>
                            <span class="marquee-gap" aria-hidden="true"></span>
                            <span class="marquee-copy marquee-copy--duplicate" aria-hidden="true"></span>
                        </span>
                    </div>
                    <div class="record-title marquee-field">
                        <span id="re-link-title" class="marquee-track">
                            <span class="marquee-copy marquee-copy--primary"></span>
                            <span class="marquee-gap" aria-hidden="true"></span>
                            <span class="marquee-copy marquee-copy--duplicate" aria-hidden="true"></span>
                        </span>
                    </div>
                    <div id="re-link-status" class="link-status"></div>
                    <div id="re-link-error" class="error-state">Link Error</div>
                </div>
            </div>
        </section>

        <!-- Stylus mode -->
        <section id="mode-stylus" class="mode-section">
            <div id="stylus-mode-name" class="stylus-name-display"></div>
            <div id="stylus-bar-full" class="stylus-bar stylus-bar--full">
                <div id="stylus-bar-full-fill" class="stylus-bar__fill"></div>
            </div>
            <div id="stylus-mode-hours" class="stylus-distance"></div>
            <div id="stylus-empty" class="empty-state">No styli found!</div>
        </section>

        <!-- Sync mode -->
        <section id="mode-sync" class="mode-section">
            <div id="sync-status" class="sync-status-text"></div>
        </section>
    </main>

    <footer id="action-bar">
        <!-- Standby actions -->
        <div id="actions-standby" class="action-group">
            <div class="btn-placeholder"></div>
            <button id="btn-mode-standby" class="btn">Mode</button>
            <button id="btn-side-standby" class="btn">Side A</button>
            <div class="btn-placeholder"></div>
        </div>

        <!-- Play actions -->
        <div id="actions-play" class="action-group">
            <button id="btn-prev-song" class="btn">&lt;Prev</button>
            <div class="btn-placeholder"></div>
            <button id="btn-side-label" class="btn">Side A</button>
            <button id="btn-next-song" class="btn">Next&gt;</button>
        </div>

        <!-- Link actions -->
        <div id="actions-link" class="action-group">
            <button id="btn-prev-record" class="btn">&lt;Prev</button>
            <button id="btn-mode-link" class="btn">Mode</button>
            <button id="btn-link" class="btn">Link</button>
            <button id="btn-next-record" class="btn">Next&gt;</button>
        </div>

        <!-- Re-Link actions -->
        <div id="actions-re-link" class="action-group">
            <button id="btn-prev-re-link" class="btn">&lt;Prev</button>
            <button id="btn-mode-re-link" class="btn">Mode</button>
            <button id="btn-re-link" class="btn">Re-Link</button>
            <button id="btn-next-re-link" class="btn">Next&gt;</button>
        </div>

        <!-- Stylus actions -->
        <div id="actions-stylus" class="action-group">
            <button id="btn-prev-stylus" class="btn">&lt;Prev</button>
            <button id="btn-mode-stylus" class="btn">Mode</button>
            <button id="btn-reset-stylus" class="btn">Reset</button>
            <button id="btn-next-stylus" class="btn">Next&gt;</button>
        </div>

        <!-- Sync actions -->
        <div id="actions-sync" class="action-group">
            <div class="btn-placeholder"></div>
            <button id="btn-mode-sync" class="btn">Mode</button>
            <button id="btn-sync" class="btn">Sync</button>
            <div class="btn-placeholder"></div>
        </div>
    </footer>

    <script src="/app.js"></script>
</body>
</html>
